name: autofix.ci
on:
  pull_request:
  push:
    branches: [ "main" ]
permissions:
  contents: read

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - run: pip install pre-commit
      - run: pre-commit run --all-files

      - uses: autofix-ci/action@c5b2d67aa2274e7b5a18224e8171550871fc7e4a
